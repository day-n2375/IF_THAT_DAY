<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>IF THAT DAY — 엔딩</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 32px;
    }
    .ending-title {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: clamp(18px, 2.5vw, 28px);
      color: #fff;
      text-align: center;
      letter-spacing: 4px;
      animation: fadeIn 3s ease forwards;
      opacity: 0;
    }
    .ending-sub {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      line-height: 2.2;
      animation: fadeIn 3s ease 1.5s forwards;
      opacity: 0;
    }
    .ending-restart {
      margin-top: 48px;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      animation: fadeIn 2s ease 4s forwards;
      opacity: 0;
      border: none;
      background: transparent;
      letter-spacing: 2px;
    }
    .ending-restart:hover { color: rgba(255,255,255,0.7); }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@300&display=swap');
  </style>
</head>
<body>
  <div class="ending-title">IF THAT DAY</div>
  <div class="ending-sub">
    그 날로 돌아갈 수 있다면.<br><br>
    — END —
  </div>
  <button class="ending-restart" onclick="restart()">▶ 처음부터</button>

  <script src="script.js"></script>
</body>
</html>
